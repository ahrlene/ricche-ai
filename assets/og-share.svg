<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060a14"/>
      <stop offset="100%" stop-color="#0c1424"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0055FF"/>
      <stop offset="50%" stop-color="#0088FF"/>
      <stop offset="100%" stop-color="#00C8FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="rgba(0,85,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,85,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Logo placeholder circle -->
  <circle cx="600" cy="220" r="60" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <text x="600" y="235" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="42" fill="#fff" letter-spacing="0.15em">R</text>
  <!-- Brand name -->
  <text x="600" y="340" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="64" fill="#ffffff" letter-spacing="0.25em">RICCHE</text>
  <!-- Tagline -->
  <text x="600" y="400" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="24" fill="#8a96aa">AI Research Infrastructure for Financial Markets</text>
  <!-- Domain -->
  <text x="600" y="540" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="20" fill="#0088FF" letter-spacing="0.1em">ricche.ai</text>
</svg>
