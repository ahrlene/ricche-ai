<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>404 — Ricche</title>
<meta name="description" content="Page not found — return to Ricche's AI research infrastructure for financial markets.">
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#0055FF" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#060a14" media="(prefers-color-scheme: dark)">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="404 — Ricche">
<meta property="og:description" content="Page not found — return to Ricche's AI research infrastructure for financial markets.">
<meta property="og:image" content="https://ricche.ai/assets/ricche-logo.png">
<meta property="og:url" content="https://ricche.ai">
<meta property="og:site_name" content="Ricche">

<link rel="icon" type="image/png" sizes="512x512" href="assets/ricche-logo.png">
<link rel="apple-touch-icon" href="assets/ricche-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@700;800&display=optional" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<noscript>
  <style>
    @media (prefers-color-scheme: dark) {
      :root { color-scheme: dark; }
      [data-theme="light"] { --bg:#060a14;--bg-alt:#0c1424;--text:#eef2f8;--text-strong:#fff;--text-body:#c5cdd8;--text-secondary:#8a96aa;--border-color:rgba(255,255,255,.08);--logo-filter:invert(1) brightness(1.8) }
    }
  </style>
</noscript>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;--neon:#0055FF;--neon-bright:#0088FF;--neon-cyan:#00C8FF}
  [data-theme="light"]{--bg:#f5f7fb;--bg-alt:#fff;--text:#0a1628;--text-strong:#000;--text-body:#2d3748;--text-secondary:#4a5568;--border-color:rgba(0,0,0,.1);--logo-filter:none}
  [data-theme="dark"]{--bg:#060a14;--bg-alt:#0c1424;--text:#eef2f8;--text-strong:#fff;--text-body:#c5cdd8;--text-secondary:#8a96aa;--border-color:rgba(255,255,255,.08);--logo-filter:invert(1) brightness(1.8)}
  html{-webkit-font-smoothing:antialiased}
  body{font-family:var(--font-body);background:var(--bg);color:var(--text-body)}
  img{max-width:100%;display:block}
  @font-face{font-family:'Space Grotesk';font-display:optional;src:local('Space Grotesk')}
  .error-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }
  .error-code {
    font-family: var(--font-display);
    font-size: clamp(5rem, 15vw, 10rem);
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, var(--neon-bright), var(--neon), var(--neon-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }
  .error-heading {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-strong);
    margin-bottom: 12px;
  }
  .error-text {
    color: var(--text-secondary);
    font-size: 1.05rem;
    margin-bottom: 32px;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }
</style>
</head>
<body>
<main class="error-page">
  <div>
    <a href="/" style="display:inline-block;margin-bottom:32px;">
      <img src="assets/ricche-logo.png" alt="Ricche" width="64" height="64" style="filter:var(--logo-filter);">
    </a>
    <div class="error-code">404</div>
    <h1 class="error-heading">Page not found</h1>
    <p class="error-text">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn-primary btn-glow">
      <span>Back to Home</span>
      <svg class="btn-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </div>
</main>
<script>
  const saved = localStorage.getItem('ricche-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  else {
    const h = new Date().getHours();
    document.documentElement.setAttribute('data-theme', (h >= 18 || h < 7) ? 'dark' : 'light');
  }
</script>
</body>
</html>
