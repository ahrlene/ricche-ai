<!DOCTYPE html>
<html lang="en" hreflang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>404 — Ricche</title>
<meta name="description" content="Page not found — return to Ricche's AI research infrastructure for financial markets.">
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#0055FF" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#060a14" media="(prefers-color-scheme: dark)">

<!-- Favicon -->
<link rel="icon" href="favicon.ico" sizes="32x32">
<link rel="icon" type="image/png" sizes="512x512" href="assets/ricche-logo.png">
<link rel="apple-touch-icon" href="assets/ricche-logo.png">

<!-- Self-hosted fonts -->
<link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/fonts/space-grotesk-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/fonts/fonts.css">
<link rel="stylesheet" href="css/styles.min.css">

<style>
  .error-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }
  .error-code {
    font-family: var(--font-display);
    font-size: clamp(5rem, 15vw, 10rem);
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, var(--neon-bright), var(--neon), var(--neon-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }
  .error-heading {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-strong);
    margin-bottom: 12px;
  }
  .error-text {
    color: var(--text-secondary);
    font-size: 1.05rem;
    margin-bottom: 32px;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }
</style>
</head>
<body>
<main class="error-page">
  <div>
    <a href="/" style="display:inline-block;margin-bottom:32px;">
      <img src="assets/ricche-logo.png" alt="Ricche" width="64" height="64" style="filter:var(--logo-filter);">
    </a>
    <div class="error-code">404</div>
    <h1 class="error-heading">Page not found</h1>
    <p class="error-text">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn-primary btn-glow">
      <span>Back to Home</span>
      <svg class="btn-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </div>
</main>
<script>
  var saved = localStorage.getItem('ricche-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
</script>
</body>
</html>
